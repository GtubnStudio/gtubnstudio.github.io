<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gtubn Studio 的网站</title>
    <!-- Web Logo / Favicon -->
    <link rel="icon" href="logo1.jpeg" type="image/jpeg">
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --border: #21262d;
            --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --panel: #ffffff; --border: #d0d7de;
            --text: #24292f; --muted: #57606a; --accent: #0969da;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            max-width: 800px; margin: 0 auto; padding: 40px 20px;
            transition: background 0.2s;
        }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 20px; font-weight: 600; }
        .nav { display: flex; gap: 16px; margin-bottom: 36px; font-size: 14px; }
        .nav a { color: var(--muted); text-decoration: none; cursor: pointer; }
        .nav a.active { color: var(--accent); font-weight: 500; }
        
        .page { display: none; }
        .page.active { display: block; }

        /* 主页 */
        .home-content { padding: 20px 0; }
        .home-content h2 { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
        .home-content p { font-size: 15px; color: var(--muted); line-height: 1.6; }

        /* 关于 */
        .about-content { line-height: 1.8; font-size: 14px; }
        .about-content p { margin-bottom: 12px; }
        .about-content span { color: var(--muted); display: inline-block; width: 80px; }
        .about-img {
            margin-top: 20px; max-width: 100%; height: auto;
            border-radius: 8px; border: 1px solid var(--border);
        }

        button {
            background: var(--panel); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 6px; color: var(--text); cursor: pointer; font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Gtubn Studio 的网站</h1>
        <button id="tog">Light Mode</button>
    </header>

    <div class="nav">
        <a id="nav-home" class="active">主页</a>
        <a id="nav-about">关于</a>
    </div>

    <!-- 主页 -->
    <div id="page-home" class="page active">
        <div class="home-content">
            <h2>欢迎来到 Gtubn Studio 的网站！</h2>
            <p>海内存知己，天涯若比邻。</p>
        </div>
    </div>

    <!-- 关于 页 -->
    <div id="page-about" class="page">
        <div class="about-content">
            <p>这是 Gtubn Studio 的网站。</p>
            <p>(c) 2026 Gtubn Studio, All Rights Reserved.</p>
            <p>我们的内容遵循 &lt;/&gt; 开源精神。</p>
            <p><span>Web 呈现</span>GitHub Pages</p>
            <img src="logo2.jpeg" alt="Gtubn Studio Logo" class="about-img">
        </div>
    </div>

    <script>
        const btnHome = document.getElementById('nav-home');
        const btnAbout = document.getElementById('nav-about');
        const pgHome = document.getElementById('page-home');
        const pgAbout = document.getElementById('page-about');

        btnHome.addEventListener('click', () => {
            btnHome.className = 'active'; btnAbout.className = '';
            pgHome.className = 'page active'; pgAbout.className = 'page';
        });
        btnAbout.addEventListener('click', () => {
            btnAbout.className = 'active'; btnHome.className = '';
            pgAbout.className = 'page active'; pgHome.className = 'page';
        });

        document.getElementById('tog').addEventListener('click', e => {
            let l = document.body.getAttribute('data-theme') === 'light';
            if (l) { document.body.removeAttribute('data-theme'); e.target.textContent = 'Light Mode'; }
            else { document.body.setAttribute('data-theme', 'light'); e.target.textContent = 'Dark Mode'; }
        });
    </script>
</body>
</html>
